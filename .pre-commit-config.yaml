# QA — Hooks de pré-commit para o backend Python
# Instalação: pip install pre-commit && pre-commit install
# Execução manual: pre-commit run --all-files

repos:
  # ── Verificações gerais ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key        # QA: bloqueia commit de chaves privadas
      - id: check-added-large-files
        args: ['--maxkb=1000']        # QA: bloqueia arquivos > 1MB (ex: modelos .pt)

  # ── Ruff: lint + format Python ────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Segurança: detecta segredos hardcoded ─────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: (package-lock\.json|\.secrets\.baseline)
