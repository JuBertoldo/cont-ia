name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Testes com cobertura
        run: pytest tests/ --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Testes com cobertura
        run: npm test -- --coverage --watchAll=false --coverageThreshold='{"global":{"lines":60}}'
